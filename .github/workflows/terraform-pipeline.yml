name: Terraform Pipeline (dev)

on:
  # Automatic execution for Terraform changes proposed to master branch.
  pull_request:
    branches:
      - master
    paths:
      - terraform/**
      - .github/workflows/**
  # Manual execution. Supports explicit apply/destroy selection.
  workflow_dispatch:
    inputs:
      terraform_action:
        description: Terraform action to run
        required: true
        type: choice
        default: apply
        options:
          - apply
          - destroy

permissions:
  contents: read
  id-token: write

# Prevent overlapping runs for the same dev pipeline.
concurrency:
  group: terraform-dev-pipeline
  cancel-in-progress: false

jobs:
  terraform-dev:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: terraform/envs/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.7

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.TF_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # Keep formatting consistent before plan/apply stages.
      - name: Terraform fmt check
        run: terraform fmt -check -recursive ../../

      - name: Terraform init
        run: terraform init -reconfigure

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -var-file=terraform.tfvars -no-color

      # Apply runs automatically on PR and on manual runs when action=apply.
      - name: Terraform apply (PR + manual apply)
        if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.terraform_action == 'apply')
        run: terraform apply -auto-approve -var-file=terraform.tfvars

      # Destroy is intentionally manual-only.
      - name: Terraform destroy (manual)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.terraform_action == 'destroy'
        run: terraform destroy -auto-approve -var-file=terraform.tfvars
