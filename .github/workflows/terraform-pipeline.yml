name: Terraform Pipeline (dev)

on:
  # Automatic execution for Terraform changes proposed to master branch.
  pull_request:
    branches:
      - master
    paths:
      - terraform/**
      - .github/workflows/**
  # Manual execution. Supports explicit apply/destroy selection.
  workflow_dispatch:
    inputs:
      terraform_action:
        description: Terraform action to run
        required: true
        type: choice
        default: apply
        options:
          - apply
          - destroy

permissions:
  contents: read
  id-token: write

# Prevent overlapping runs for the same dev pipeline.
concurrency:
  group: terraform-dev-pipeline
  cancel-in-progress: false

jobs:
  terraform-dev:
    runs-on: ubuntu-latest
    environment: dev
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      TERRAFORM_EXECUTION_ROLE_NAME: ${{ vars.TERRAFORM_EXECUTION_ROLE_NAME }}
      VPC_CIDR: ${{ vars.VPC_CIDR }}
      PUBLIC_SUBNET_CIDRS: ${{ vars.PUBLIC_SUBNET_CIDRS }}
      PRIVATE_SUBNET_CIDRS: ${{ vars.PRIVATE_SUBNET_CIDRS }}
      CPU_INSTANCE_TYPES: ${{ vars.CPU_INSTANCE_TYPES }}
      GPU_INSTANCE_TYPES: ${{ vars.GPU_INSTANCE_TYPES }}
    defaults:
      run:
        shell: bash
        working-directory: terraform/envs/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.7

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # Keep formatting consistent before runtime files are generated.
      - name: Terraform fmt check
        run: terraform fmt -check -recursive ../../

      # Build a runtime tfvars file from GitHub Environment variables.
      - name: Generate runtime tfvars
        run: |
          cat > ci.auto.tfvars <<EOF
          aws_region                    = "${AWS_REGION}"
          aws_account_id                = "${AWS_ACCOUNT_ID}"
          terraform_execution_role_name = "${TERRAFORM_EXECUTION_ROLE_NAME}"

          vpc_cidr = "${VPC_CIDR}"

          public_subnet_cidrs  = ${PUBLIC_SUBNET_CIDRS}
          private_subnet_cidrs = ${PRIVATE_SUBNET_CIDRS}
          cpu_instance_types   = ${CPU_INSTANCE_TYPES}
          gpu_instance_types   = ${GPU_INSTANCE_TYPES}
          EOF

      - name: Terraform init
        run: terraform init -reconfigure

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -var-file=ci.auto.tfvars -no-color

      # Apply runs automatically on PR and on manual runs when action=apply.
      - name: Terraform apply (PR + manual apply)
        if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.terraform_action == 'apply')
        run: terraform apply -auto-approve -var-file=ci.auto.tfvars

      # Destroy is intentionally manual-only.
      - name: Terraform destroy (manual)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.terraform_action == 'destroy'
        run: terraform destroy -auto-approve -var-file=ci.auto.tfvars
